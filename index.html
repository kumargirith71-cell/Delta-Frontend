<!DOCTYPE html>
<html>
<head>
<title>DeltaSigma API</title>
<style>
body{
font-family:Arial;
margin:40px;
}

input{
margin:5px;
padding:8px;
}

button{
padding:8px 15px;
margin:5px;
}

#result{
margin-top:20px;
padding:10px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>Add User</h2>

<input type="number" id="id" placeholder="ID"><br>
<input type="text" id="name" placeholder="Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="text" id="discription" placeholder="Description"><br>

<button onclick="addUser()">Add</button>

<hr>

<h2>Get User By ID</h2>

<input type="number" id="searchId" placeholder="Enter ID">
<button onclick="getUser()">Get User</button>

<div id="result"></div>

<script>

const API = "https://delta-project-czl2.onrender.com/delta";

function addUser(){

const data = {
id: document.getElementById("id").value,
name: document.getElementById("name").value,
email: document.getElementById("email").value,
discription: document.getElementById("discription").value
};

fetch(API + "/add",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
})
.then(res => res.json())
.then(data => {
document.getElementById("result").innerHTML =
"<b>User Added:</b><br>"+JSON.stringify(data,null,2);
})
.catch(err => console.log(err));

}

function getUser(){

const id = document.getElementById("searchId").value;

fetch(API + "/get/" + id)
.then(res => res.json())
.then(data => {
document.getElementById("result").innerHTML =
"<b>User Found:</b><br>"+JSON.stringify(data,null,2);
})
.catch(err => console.log(err));

}

</script>

</body>
</html>
